name: fm_container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  CI:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.13]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python with Poetry
        uses: Deltares-research/github-actions/actions/python-setup/poetry@main
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: 2.3.3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Pull image from DockerHub
        run: docker pull deltares/delft3dfm

      - name: Run only integration test to generate input
        run: poetry run pytest -m docker

      - name: Run image in container
        run: docker run  -v $(pwd)/tests/data/output/docker:/data deltares/delft3dfm /opt/delft3dfm_latest/lnx64/bin/run_dimr.sh
