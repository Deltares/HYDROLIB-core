name: mkdocs-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  release:
    types: [published]
  workflow_run:
    workflows: ["Automated release workflow"]
    types: [completed]

jobs:
  deploy-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: Deltares-research/github-actions/actions/mkdocs-deploy@main
        with:
          trigger: pr
          package-manager: poetry
          python-version: '3.13'
          install-groups: docs
          deploy-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: Deltares-research/github-actions/actions/mkdocs-deploy@main
        with:
          trigger: main
          package-manager: poetry
          python-version: '3.13'
          install-groups: docs
          deploy-token: ${{ secrets.GITHUB_TOKEN }}
          main-set-default: 'false'

  deploy-release:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Resolve release tag and prerelease flag
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          else
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
            if [ -z "${TAG}" ]; then
              echo "::error::No release found"
              exit 1
            fi
            git checkout "${TAG}"
            if echo "${TAG}" | grep -qE '(a|b|rc)[0-9]+$'; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - uses: Deltares-research/github-actions/actions/mkdocs-deploy@main
        with:
          trigger: release
          package-manager: poetry
          python-version: '3.13'
          install-groups: docs
          deploy-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.meta.outputs.tag }}
          release-prerelease: ${{ steps.meta.outputs.prerelease }}
