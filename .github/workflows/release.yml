name: Automated release workflow

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Branch to create release from"
        required: false
        default: "main"
      increment:
        description: "Version increment type (patch for bugfixes, minor for features, major for breaking changes)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease_type:
        description: "Prerelease type (none for stable releases)"
        required: false
        type: choice
        default: "none"
        options:
          - none
          - alpha
          - beta
          - rc

jobs:
  wheel-test:
    uses: ./.github/workflows/wheel-test.yml
    with:
      ref: ${{ github.event.inputs.release_branch }}

  release:
    needs: wheel-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_branch }}

      - name: Create release with version bump
        id: release
        uses: Deltares-research/github-actions/actions/release/github@main
        with:
          release-branch: ${{ github.event.inputs.release_branch }}
          increment: ${{ github.event.inputs.increment }}
          prerelease-type: ${{ github.event.inputs.prerelease_type }}
          package-manager: poetry
          python-version: '3.13'
          install-groups: 'dev'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-wheel: 'true'

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
