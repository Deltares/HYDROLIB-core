name: Wheel build and install test

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  wheel-test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run image
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: 2.3.3

      - name: Build wheel
        run: poetry build -f wheel

      - name: Create fresh venv and install wheel
        shell: bash
        run: |
          python -m venv test-venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source test-venv/Scripts/activate
          else
            source test-venv/bin/activate
          fi

          pip install dist/*.whl
          pip install pytest

      - name: Run tests against installed wheel
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source test-venv/Scripts/activate
          else
            source test-venv/bin/activate
          fi

          pytest -v
