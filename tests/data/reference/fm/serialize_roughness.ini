[General]
fileVersion        = 3.01      # File version. Do not edit this.
fileType           = roughness # File type. Should be 'roughness'. Do not edit this.

[Global]
frictionId    = Main  # Name of the roughness variable.
frictionType  = Chezy # The global roughness type for this variable, which is used if no branch specific roughness definition is given.
frictionValue = 45.00 # The global default value for this roughness variable.

[Branch]
branchId       = Channel1    # The name of the branch.
frictionType   = Manning     # The roughness type to be used on this branch.
functionType   = constant    # Function type for the calculation of the value. Possible values: constant, timeSeries, absDischarge, waterlevel.
numLocations   = 2           # Number of locations on branch. The default 0 implies branch uniform values.
chainage       = 0.00 100.00 # Space separated list of locations on the branch [m]. Locations sorted by increasing chainage. The keyword must be specified if numLocations>0.
frictionValues = 0.20 0.30   # numLevels lines containing space separated lists of roughness values: numLocations values per line. If the functionType is constant, then a single line is required. For a uniform roughness per branch (numLocations = 0) a single entry per line is required. The meaning of the values depends on the roughness type selected (see frictionType).

